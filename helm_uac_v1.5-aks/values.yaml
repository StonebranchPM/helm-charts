#########################################################
# UAC Helm Deployment
#########################################################

serviceAccount:
  name: "default"

istiosidecar:
  enabled: true
  injection:
    enabled: true

oms:
  enabled: true
  persistentVolume: # Using established persistent volume
    enabled: false
persistentVolume:
  name: ""

nodeSelector:
  kubernetes.io/os: linux
  agentpool: 

############################################ UC Deployment ############################################
ucDeployment:
  replicas: 1
  imagePullSecrets:
    enabled: true
  image:
    repository: ""
    tag: ""
  resources:
    requests:
      memory: "1Gi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

############################################ OMS Deployment ###########################################
omsDeployment:
  replicas: 1
  image:
    repository: ""
    tag: ""
  resources:
    requests:
      memory: "1Gi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  storageRequest: 1Gi
  storageClassName: "default"
  accessMode: ReadWriteOnce



############################################ Istio #####################################################
istio:
  enabled: true
  host: ""
  hostCredentials: ""
  TLSProtocol: "TLSV1_2"
  omsConnectionPort: 444
  udmConnectionPort: 445

############################################ Azure Key Vault ##########################################
keyVault:
  enabled: false
  name: ""
  managedIdentityClientId: ""
  tenantId: ""
  secrets:
    - name: ""
      key: ""
    - name: ""
      key: ""
    - name: ""
      key: ""
    - name: ""
      key: ""

############################################ UC ConfigMap values ######################################
ucConfig:
  ucDbRdbms: "mysql"
  ucDbUrl: "jdbc:mysql://mysql-service:3306/"
  ucDbName: "sb_test"
  ucDbUser: "root"
  ucDbPassword: "rootpassword"   # used only when keyVault.enabled=false
  ucNodeTransient: true
  ucOmsServiceTimeout: 30
  ucNodeHeartbeatThreshold: 30

  # LDAP
