  ucTrustmanagerAlgorithm: ""
  ucTrustmanagerProvider: ""
  ucTrustmanagerSSLProtocols: ""
  ucUISessionsTimeout: ""
  ucWebServiceAllowUnknownProperties: ""
  ucWebServiceHTTPClientSocketKeepAlive: ""
  extensionmaxbytes: "250000000"
