######################################## Generic certificate mounts for OMS ########################################
# For each cert-like value above, add a Secret mapping here. The Deployment will:
# - check if the *value path* is non-empty, and the cert entry is enabled,
# - then create a Secret volume and mount it at mountDir with fileName (using subPath if needed).
certs:
  oms:
    # OpenTelemetry
    otelsslcacertpath:
      enabled: false
      secretName: ""
      secretKey: "otel-ca.crt"
      mountDir: "/etc/oms-certs/otel"
      fileName: "ca.crt"
    otelsslclientcertpath:
      enabled: false
      secretName: ""
      secretKey: "otel-client.crt"
      mountDir: "/etc/oms-certs/otel"
      fileName: "client.crt"
    otelsslclientkeypath:
      enabled: false
      secretName: ""
      secretKey: "otel-client.key"
      mountDir: "/etc/oms-certs/otel"
      fileName: "client.key"

    # OMS direct certs
    omsClientCertificatePath:
      enabled: false
      secretName: ""
      secretKey: "oms-client.crt"
      mountDir: "/etc/oms-certs/oms"
      fileName: "client.crt"
    omsClientKeyPath:
      enabled: false
      secretName: ""
      secretKey: "oms-client.key"
      mountDir: "/etc/oms-certs/oms"
      fileName: "client.key"
    omsServerCertificatePath:
      enabled: false
      secretName: ""
      secretKey: "oms-server.crt"
      mountDir: "/etc/oms-certs/oms"
      fileName: "server.crt"
    omsCACertificatePath:
      enabled: false
      secretName: ""
      secretKey: "oms-ca.crt"
      mountDir: "/etc/oms-certs/oms"
      fileName: "ca.crt"

    # UBR
    ubrcacerts:
      enabled: false
      secretName: ""
      secretKey: "ubr-ca.crt"
      mountDir: "/etc/oms-certs/ubr"
      fileName: "ca.crt"
    ubrcert:
      enabled: false
      secretName: ""
      secretKey: "ubr.crt"
      mountDir: "/etc/oms-certs/ubr"
      fileName: "ubr.crt"
    ubrcrl:
      enabled: false
      secretName: ""
      secretKey: "ubr.crl"
      mountDir: "/etc/oms-certs/ubr"
      fileName: "ubr.crl"
    ubrecdsacert:
      enabled: false
      secretName: ""
      secretKey: "ubr-ecdsa.crt"
      mountDir: "/etc/oms-certs/ubr"
      fileName: "ecdsa.crt"
    ubrecdsaprivatekey:
      enabled: false
      secretName: ""
      secretKey: "ubr-ecdsa.key"
      mountDir: "/etc/oms-certs/ubr"
      fileName: "ecdsa.key"
    ubrprivatekey:
      enabled: false
      secretName: ""
      secretKey: "ubr.key"
      mountDir: "/etc/oms-certs/ubr"
      fileName: "ubr.key"

    # UDM
    udmcacerts:
      enabled: false
      secretName: ""
      secretKey: "udm-ca.crt"
      mountDir: "/etc/oms-certs/udm"
      fileName: "ca.crt"
    udmcert:
      enabled: false
      secretName: ""
      secretKey: "udm-cert.crt"
      mountDir: "/etc/oms-certs/udm"
      fileName: "udm-cert.crt"
    udmcrl:
      enabled: false
      secretName: ""
      secretKey: "udm.crl"
      mountDir: "/etc/oms-certs/udm"
      fileName: "udm.crl"
    udmprivatekey:
      enabled: false
      secretName: ""
      secretKey: "udm.key"
      mountDir: "/etc/oms-certs/udm"
      fileName: "udm.key"
    udmproxycertificates:
      enabled: false
      secretName: ""
      secretKey: "udm-proxy.pem"
      mountDir: "/etc/oms-certs/udm"
      fileName: "proxy.pem"
